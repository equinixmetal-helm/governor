{{- if .Values.api.enabled }}
{{ $ingressHost := .Values.api.ingress.host }}
{{ $additionalHosts := .Values.api.ingress.additionalHosts }}
{{ $hosts := list }}
{{ $hosts = (prepend $hosts $ingressHost) }}
{{- if $additionalHosts }}
  {{- range $additionalHosts }}
    {{- $h := . }}
    {{- $hosts = (prepend $hosts $h) }}
  {{- end }}
{{- end }}
---
apiVersion: {{ include "common.capabilities.ingress.apiVersion" . }}
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  name: governor-api
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    {{- with .Values.api.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.api.ingress.className }}
  rules:
    {{- range $hosts }}
    - host: {{ . }}
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: governor-api
                port:
                  name: http
          - path: "/healthz"
            pathType: Prefix
            backend:
              service:
                name: governor-api
                port:
                  name: http
    {{- end }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . }}
      {{- end }}
      secretName: governor-api-tls
{{- end }}
